spring:
  application:
    name: application-service
  datasource:
    url: jdbc:mysql://localhost:3308/application_db
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration


server:
  port: 8084
